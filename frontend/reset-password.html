<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Gautam Insurance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body>
    <div class="login-modal" style="position: static; background: var(--bg-secondary);">
        <div class="login-content" style="max-width: 480px;">
            <div class="login-header">
                <h2>Reset Password</h2>
                <p>Set a new password for your advisor account.</p>
            </div>
            <form id="reset-password-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new_password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Update Password</button>
                <div id="reset-message" class="error-message" style="display: none;"></div>
            </form>
        </div>
    </div>

    <script src="/static/js/reset_password.js"></script>
</body>
</html>
